name: Build reTerminal E1002 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # позволяет запускать вручную из UI

jobs:
  build:
    name: Build for reTerminal E1002
    runs-on: ubuntu-latest
    
    # Используем официальный контейнер Espressif с ESP-IDF
    container: espressif/idf:v5.1.2
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'  # IMPORTANT: нужны все подмодули!
      
      - name: Cache managed components
        uses: actions/cache@v4
        with:
          path: |
            **/managed_components
          key: ${{ runner.os }}-components-${{ hashFiles('**/idf_component_manager.lock') }}
          restore-keys: |
            ${{ runner.os }}-components-
      
      - name: Set target and build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build
      
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-reterminal-e1002
          path: |
            build/*.bin
            build/flasher_args.json
